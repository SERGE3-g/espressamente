# ─────────────────────────────────────────────────────────────────────────────
# DevTools — pgAdmin 4
# Accessibile su 127.0.0.1:5050 (SSH tunnel dal Mac)
#
# Avvio:
#   docker compose -f docker/docker-compose.tools.yml up -d
#
# Accesso dal Mac:
#   ssh -L 5050:127.0.0.1:5050 -i ~/.ssh/espressamente_deploy root@217.154.119.208
#   → apri http://localhost:5050
#
# Connessioni DB preconfigurate:
#   Espressamente Staging  → host.docker.internal:5434
#   Espressamente Prod     → host.docker.internal:5433
#   JurixSuite Dev         → host.docker.internal:5432
# ─────────────────────────────────────────────────────────────────────────────

name: devtools

services:

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: devtools-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@espressamente.eu}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/pgpass:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  pgadmin_data:
    name: devtools_pgadmin_data
