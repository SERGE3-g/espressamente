# ─────────────────────────────────────────────────────────────────────────────
# Produzione — usa immagini da ghcr.io
# Il reverse proxy (Nginx) gira NATIVO sull'host, non in Docker.
#
# Avvio:
#   TAG=<sha> REPO_OWNER=serge3-g \
#   docker compose -f docker/docker-compose.prod.yml --env-file .env.production up -d
# ─────────────────────────────────────────────────────────────────────────────

name: espressamente-prod

services:

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/${REPO_OWNER:-serge3-g}/espressamente-frontend:${TAG:-latest}
    container_name: esp-prod-frontend
    ports:
      - "127.0.0.1:3010:3010"   # solo localhost, Nginx proxia dall'esterno
    environment:
      - NODE_ENV=production
      - API_URL=http://backend:8080/api
    depends_on:
      - backend
    restart: unless-stopped

  # ── Spring Boot backend ──────────────────────────────────────────────────────
  backend:
    image: ghcr.io/${REPO_OWNER:-serge3-g}/espressamente-backend:${TAG:-latest}
    container_name: esp-prod-backend
    ports:
      - "127.0.0.1:8082:8080"   # solo localhost, Nginx proxia /api/
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=https://espressamente.eu,https://www.espressamente.eu
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL:-info@espressamente.eu}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
    volumes:
      - backend_uploads_prod:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: esp-prod-db
    ports:
      - "127.0.0.1:5433:5432"   # pgAdmin: host.docker.internal:5433
    environment:
      - POSTGRES_DB=espressamente_db
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d espressamente_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (cache) ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: esp-prod-redis
    restart: unless-stopped

volumes:
  postgres_data_prod:
  backend_uploads_prod:
