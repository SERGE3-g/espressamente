version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Produzione — usa immagini da ghcr.io
# Avvio: TAG=abc1234 docker compose -f docker-compose.prod.yml --env-file ../.env.production up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Reverse proxy ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro       # fullchain.pem + privkey.pem
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/serge3-g/espressamente-frontend:${TAG:-latest}
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # ── Spring Boot backend ──────────────────────────────────────────────────────
  backend:
    image: ghcr.io/serge3-g/espressamente-backend:${TAG:-latest}
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=https://www.espressamente.it
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL:-info@espressamente.it}
      # S3 / MinIO (opzionale, solo se STORAGE_TYPE=s3)
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=espressamente_db
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d espressamente_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (cache) ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
