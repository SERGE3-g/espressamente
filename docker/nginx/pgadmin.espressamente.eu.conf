# ─────────────────────────────────────────────────────────────────────────────
# pgAdmin — pgadmin.espressamente.eu
# Protetto da HTTP Basic Auth
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name pgadmin.espressamente.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name pgadmin.espressamente.eu;

    ssl_certificate     /etc/letsencrypt/live/pgadmin.espressamente.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pgadmin.espressamente.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── HTTP Basic Auth ───────────────────────────────────────────────────────
    auth_basic           "pgAdmin — Accesso riservato";
    auth_basic_user_file /etc/nginx/.htpasswd-pgadmin;

    # ── Proxy verso pgAdmin ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5050;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout  300s;
        proxy_connect_timeout 300s;
    }
}
