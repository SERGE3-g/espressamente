# ─────────────────────────────────────────────────────────────────────────────
# Virtual host — Produzione
# Dominio:  espressamente.eu  (www → redirect al naked domain)
# Posizione sul server: /etc/nginx/sites-available/espressamente.eu
#
# SSL: gestito da Certbot (Let's Encrypt)
#   sudo certbot --nginx -d espressamente.eu -d www.espressamente.eu
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP: ACME challenge + redirect HTTPS ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name espressamente.eu www.espressamente.eu;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://espressamente.eu$request_uri;
    }
}

# ── HTTPS: produzione ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name espressamente.eu www.espressamente.eu;

    # Certbot aggiunge automaticamente queste righe dopo il primo run:
    ssl_certificate     /etc/letsencrypt/live/espressamente.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/espressamente.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # www → naked domain
    if ($host = www.espressamente.eu) {
        return 301 https://espressamente.eu$request_uri;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── API → Spring Boot (porta 8080) ───────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8082/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Frontend → Next.js (porta 3010) ─────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
