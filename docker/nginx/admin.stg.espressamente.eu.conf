# ─────────────────────────────────────────────────────────────────────────────
# Virtual host — Admin Dashboard Staging
# Dominio:  admin.stg.espressamente.eu
# Posizione sul server: /etc/nginx/sites-available/admin.stg.espressamente.eu
#
# SSL: gestito da Certbot (Let's Encrypt)
#   sudo certbot --nginx -d admin.stg.espressamente.eu
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP: ACME challenge + redirect HTTPS ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name admin.stg.espressamente.eu;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://admin.stg.espressamente.eu$request_uri;
    }
}

# ── HTTPS: admin staging ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.stg.espressamente.eu;

    ssl_certificate     /etc/letsencrypt/live/admin.stg.espressamente.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.stg.espressamente.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── API → Spring Boot staging (porta 8081) ───────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Admin Dashboard → Next.js (porta 3012) ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3012;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
