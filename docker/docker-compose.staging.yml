# ─────────────────────────────────────────────────────────────────────────────
# Staging/Test — usa immagini da ghcr.io con tag :staging
# Dominio: stg.espressamente.eu  |  Porte host: 3011 (frontend), 8081 (backend)
#
# Avvio:
#   TAG=staging REPO_OWNER=serge3-g \
#   docker compose -f docker/docker-compose.staging.yml --env-file .env.staging up -d
# ─────────────────────────────────────────────────────────────────────────────

name: espressamente-staging

services:

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/${REPO_OWNER:-serge3-g}/espressamente-frontend:${TAG:-staging}
    container_name: esp-staging-frontend
    ports:
      - "127.0.0.1:3011:3010"   # porta diversa dalla prod (3010)
    environment:
      - NODE_ENV=production
      - API_URL=http://backend:8080/api
    depends_on:
      - backend
    restart: unless-stopped

  # ── Spring Boot backend ──────────────────────────────────────────────────────
  backend:
    image: ghcr.io/${REPO_OWNER:-serge3-g}/espressamente-backend:${TAG:-staging}
    container_name: esp-staging-backend
    ports:
      - "127.0.0.1:8081:8080"   # porta diversa dalla prod (8080)
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - DB_HOST=postgres
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=https://stg.espressamente.eu
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL:-dev@espressamente.eu}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
    volumes:
      - backend_uploads_staging:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: esp-staging-db
    environment:
      - POSTGRES_DB=espressamente_db
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d espressamente_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (cache) ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: esp-staging-redis
    restart: unless-stopped

volumes:
  postgres_data_staging:
  backend_uploads_staging:
