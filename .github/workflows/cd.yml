name: CD — Build & Push Docker Images

on:
  push:
    branches: [master, main]

env:
  REGISTRY: ghcr.io
  REPO_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & Push to ghcr.io
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ── Docker Buildx (multi-platform) ────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login GitHub Container Registry ──────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build + Push FRONTEND ─────────────────────────────────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://www.espressamente.it/api
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/espressamente-frontend:latest
            ghcr.io/${{ env.REPO_OWNER }}/espressamente-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build + Push BACKEND ──────────────────────────────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/espressamente-backend:latest
            ghcr.io/${{ env.REPO_OWNER }}/espressamente-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Riepilogo output ──────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "### Docker images published 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| frontend | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| backend  | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

