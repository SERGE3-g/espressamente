name: CD — Build, Push & Deploy

# ─────────────────────────────────────────────────────────────────────────────
# Strategia branch:
#   master  → build con tag :latest  → deploy PRODUZIONE (espressamente.eu)
#   develop → build con tag :staging → deploy STAGING (test.espressamente.eu)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [master, main, develop]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Variabili comuni ─────────────────────────────────────────────────────────
  setup:
    name: Setup variabili
    runs-on: ubuntu-latest
    outputs:
      repo_owner: ${{ steps.vars.outputs.repo_owner }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
      environment: ${{ steps.vars.outputs.environment }}
      is_prod: ${{ steps.vars.outputs.is_prod }}
    steps:
      - name: Calcola variabili
        id: vars
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "repo_owner=${OWNER}" >> $GITHUB_OUTPUT

          if [[ "${{ github.ref_name }}" == "master" || "${{ github.ref_name }}" == "main" ]]; then
            echo "image_tag=latest"      >> $GITHUB_OUTPUT
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "is_prod=true"          >> $GITHUB_OUTPUT
          else
            echo "image_tag=staging"     >> $GITHUB_OUTPUT
            echo "environment=staging"   >> $GITHUB_OUTPUT
            echo "is_prod=false"         >> $GITHUB_OUTPUT
          fi

  # ── Build & Push immagini Docker ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ needs.setup.outputs.image_tag }})
    runs-on: ubuntu-latest
    needs: setup

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Frontend ───────────────────────────────────────────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ needs.setup.outputs.is_prod == 'true' && 'https://espressamente.eu/api' || 'https://stg.espressamente.eu/api' }}
          tags: |
            ghcr.io/${{ needs.setup.outputs.repo_owner }}/espressamente-frontend:${{ needs.setup.outputs.image_tag }}
            ghcr.io/${{ needs.setup.outputs.repo_owner }}/espressamente-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Admin Dashboard ────────────────────────────────────────────────────
      - name: Build and push admin
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ needs.setup.outputs.is_prod == 'true' && 'https://admin.espressamente.eu/api' || 'https://admin.stg.espressamente.eu/api' }}
          tags: |
            ghcr.io/${{ needs.setup.outputs.repo_owner }}/espressamente-admin:${{ needs.setup.outputs.image_tag }}
            ghcr.io/${{ needs.setup.outputs.repo_owner }}/espressamente-admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Backend ────────────────────────────────────────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ needs.setup.outputs.repo_owner }}/espressamente-backend:${{ needs.setup.outputs.image_tag }}
            ghcr.io/${{ needs.setup.outputs.repo_owner }}/espressamente-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Riepilogo ─────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "### Docker images pubblicati 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| frontend | \`${{ needs.setup.outputs.image_tag }}\` / \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| admin    | \`${{ needs.setup.outputs.image_tag }}\` / \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| backend  | \`${{ needs.setup.outputs.image_tag }}\` / \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ── Deploy Produzione ─────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy → Produzione (espressamente.eu)
    runs-on: ubuntu-latest
    needs: [setup, build-and-push]
    if: false # temporaneamente disabilitato — abilitare quando staging è validato
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"
            export TAG="${{ github.sha }}"
            export REPO_OWNER="${{ needs.setup.outputs.repo_owner }}"
            bash /opt/espressamente/repo/scripts/deploy-prod.sh

  # ── Deploy Staging ─────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging (stg.espressamente.eu)
    runs-on: ubuntu-latest
    needs: [setup, build-and-push]
    if: needs.setup.outputs.is_prod == 'false'
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"
            export TAG="${{ github.sha }}"
            export REPO_OWNER="${{ needs.setup.outputs.repo_owner }}"
            bash /opt/espressamente/repo/scripts/deploy-staging.sh
