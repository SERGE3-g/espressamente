server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: espressamente-api

  # ── Database ──
  datasource:
    url: jdbc:postgresql://localhost:5432/espressamente_db
    username: ${DB_USERNAME:sergeguea}
    password: ${DB_PASSWORD:lamiapassword1}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  # ── Flyway ──
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ── File Upload ──
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ── Mail ──
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

# ── JWT ──
app:
  jwt:
    secret: ${JWT_SECRET:espressamente-dev-secret-key-change-in-production-min-256-bits!!}
    expiration-ms: 86400000  # 24 ore

  # ── CORS ──
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3010}

  # ── S3 / MinIO ──
  storage:
    type: ${STORAGE_TYPE:local}  # local | s3
    local-path: ./uploads
    s3:
      bucket: ${S3_BUCKET:espressamente-media}
      region: ${S3_REGION:eu-south-1}
      endpoint: ${S3_ENDPOINT:}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}

  # ── Contatti ──
  contact:
    notification-email: ${NOTIFICATION_EMAIL:info@espressamente.it}

# ── Logging ──
logging:
  level:
    root: INFO
    it.espressamente: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Swagger / OpenAPI ──
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

---
# Profilo di produzione
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    it.espressamente: INFO
    org.hibernate.SQL: WARN
