server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: espressamente-api

  # ── Database ──
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/espressamente_db
    username: ${DB_USERNAME:sergeguea}
    password: ${DB_PASSWORD:lamiapassword1}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  # ── Flyway ──
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ── File Upload ──
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ── Mail ──
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# ── JWT ──
app:
  jwt:
    secret: ${JWT_SECRET:espressamente-dev-secret-key-change-in-production-min-256-bits!!}
    expiration-ms: 3600000          # 1 ora
    refresh-expiration-ms: 604800000  # 7 giorni

  # ── CORS ──
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3010,http://localhost:3020,http://192.168.1.17:3010,http://192.168.1.17:3020}

  # ── S3 / MinIO ──
  storage:
    type: ${STORAGE_TYPE:local}  # local | s3
    local-path: ./uploads
    s3:
      bucket: ${S3_BUCKET:espressamente-media}
      region: ${S3_REGION:eu-south-1}
      endpoint: ${S3_ENDPOINT:}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}

  # ── Admin dashboard URL (per link email reset password) ──
  admin:
    base-url: ${ADMIN_BASE_URL:http://localhost:3020}

  # ── Cookie sicuri (abilitare in produzione con HTTPS) ──
  cookie:
    secure: ${COOKIE_SECURE:false}

  # ── Cifratura DB (AES-256-GCM) ──
  # Imposta DB_ENCRYPTION_KEY con 32 byte in base64, es: openssl rand -base64 32
  # Se vuoto, la cifratura è disabilitata (solo sviluppo locale)
  encryption:
    key: ${DB_ENCRYPTION_KEY:}

  # ── Azienda (per PDF fatture) ──
  company:
    name: ${COMPANY_NAME:Espressamente Coffee}
    address: ${COMPANY_ADDRESS:Via Rubino 32, 04023 Formia (LT)}
    vat-number: ${COMPANY_VAT:01896400593}
    fiscal-code: ${COMPANY_CF:}
    sdi: ${COMPANY_SDI:0000000}
    phone: ${COMPANY_PHONE:0771 010221}
    mobile: ${COMPANY_MOBILE:+39 335 825 6395}
    email: ${COMPANY_EMAIL:info@espressamente.eu}
    pec: ${COMPANY_PEC:}
    website: ${COMPANY_WEBSITE:www.espressamente.eu}
    logo-path: ${COMPANY_LOGO:classpath:static/logo.png}

  # ── Contatti ──
  contact:
    notification-email: ${NOTIFICATION_EMAIL:info@espressamente.it}

# ── Logging ──
# Configurazione dettagliata in logback-spring.xml (per profilo)
# Qui solo override minimali se necessari
logging:
  level:
    root: WARN

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Swagger / OpenAPI ──
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    filter: true

---
# Profilo di produzione
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false

app:
  cookie:
    secure: true

# Logging gestito da logback-spring.xml (profilo prod)

# Swagger disabilitato in produzione
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
